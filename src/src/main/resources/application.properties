spring.application.name=campus-checkin-assistant

spring.main.allow-bean-definition-overriding=true

# ==================== LangChain4j OpenAI (DashScope) ====================
langchain4j.open-ai.chat-model.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
langchain4j.open-ai.chat-model.api-key=sk-33687bfd11ce4da6899e38acccc82f14
langchain4j.open-ai.chat-model.model-name=qwen-max
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true

langchain4j.open-ai.streaming-chat-model.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
langchain4j.open-ai.streaming-chat-model.api-key=sk-33687bfd11ce4da6899e38acccc82f14
langchain4j.open-ai.streaming-chat-model.model-name=qwen-max
langchain4j.open-ai.streaming-chat-model.log-requests=true
langchain4j.open-ai.streaming-chat-model.log-responses=true

# ==================== MySQL ====================
spring.datasource.url=jdbc:mysql://localhost:3306/checkin_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
spring.datasource.username=root
spring.datasource.password=pafunya@520wuerwu
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA ====================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.generate_statistics=true

# ==================== Logging ====================
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.type.descriptor.sql.BasicExtractor=TRACE
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=INFO
logging.level.org.hibernate.engine.QueryParameters=INFO
logging.level.org.hibernate.engine.query.spi.HQLQueryPlan=INFO
logging.level.org.hibernate.stat=INFO

logging.level.org.springframework.data.jpa=INFO
logging.level.org.springframework.orm.jpa=INFO

logging.level.root=INFO

logging.level.dev.langchain4j=INFO
logging.level.dev.langchain4j.model.openai=INFO
logging.level.dev.langchain4j.model.openai.OpenAiChatModel=INFO
logging.level.dev.langchain4j.model.openai.OpenAiStreamingChatModel=INFO
logging.level.dev.langchain4j.model.openai.OpenAiEmbeddingModel=INFO

logging.level.okhttp3=INFO
logging.level.retrofit2=INFO
logging.level.org.apache.http=INFO

logging.level.org.example.aiservice=INFO
logging.level.org.example.service=INFO
logging.level.org.example.tools=INFO
logging.level.org.example.config=INFO
logging.level.dev.langchain4j.service.tool=INFO
logging.level.dev.langchain4j.service.tool.DefaultToolExecutor=INFO
logging.level.dev.langchain4j.agent.tool=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n

logging.level.com.alibaba.dashscope=INFO

# ==================== MyBatis-Plus ====================
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ==================== Thymeleaf ====================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**
