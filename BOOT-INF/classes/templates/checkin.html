<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寝室签到 — 人脸 + 定位验证</title>
    <style>
        :root, [data-theme="light"] {
            --bg-canvas: #F7F6F3;
            --bg-surface: #FFFFFF;
            --bg-elevated: #F9F9F8;
            --text-primary: #1a1a1a;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --border: #E5E5E3;
            --border-subtle: #F0F0EE;
            --accent: #2563EB;
            --accent-hover: #1d4ed8;
            --accent-light: #EFF6FF;
            --success: #059669;
            --success-light: #ECFDF5;
            --error: #DC2626;
            --error-light: #FEF2F2;
            --warning: #D97706;
            --warning-light: #FFFBEB;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
        }
        [data-theme="dark"] {
            --bg-canvas: #0f0f0f;
            --bg-surface: #1a1a1a;
            --bg-elevated: #242424;
            --text-primary: #f0f0f0;
            --text-secondary: #9ca3af;
            --text-tertiary: #6b7280;
            --border: #2a2a2a;
            --border-subtle: #1f1f1f;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --accent-light: #1e293b;
            --success: #10b981;
            --success-light: #064e3b;
            --error: #ef4444;
            --error-light: #450a0a;
            --warning: #f59e0b;
            --warning-light: #451a03;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.3);
        }
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --bg-canvas: #0f0f0f;
                --bg-surface: #1a1a1a;
                --bg-elevated: #242424;
                --text-primary: #f0f0f0;
                --text-secondary: #9ca3af;
                --text-tertiary: #6b7280;
                --border: #2a2a2a;
                --border-subtle: #1f1f1f;
                --accent: #3b82f6;
                --accent-hover: #60a5fa;
                --accent-light: #1e293b;
                --success: #10b981;
                --success-light: #064e3b;
                --error: #ef4444;
                --error-light: #450a0a;
                --warning: #f59e0b;
                --warning-light: #451a03;
                --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
                --shadow-md: 0 2px 8px rgba(0,0,0,0.3);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Pro Display', 'PingFang SC', -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg-canvas);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Top Nav */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .top-nav .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            transition: all 0.15s;
        }
        .top-nav .back-btn:hover { background: var(--bg-elevated); color: var(--text-primary); }
        .top-nav .title { font-size: 16px; font-weight: 600; }
        .top-nav .nav-right { display: flex; align-items: center; gap: 16px; }
        .top-nav .time {
            font-size: 13px;
            color: var(--text-tertiary);
            font-variant-numeric: tabular-nums;
        }

        /* Theme Toggle */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 2px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 3px;
            cursor: pointer;
        }
        .theme-toggle .theme-option {
            width: 32px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 14px;
            transition: background 0.15s;
            color: var(--text-tertiary);
        }
        .theme-toggle .theme-option.active {
            background: var(--bg-surface);
            color: var(--text-primary);
            box-shadow: var(--shadow-sm);
        }

        /* Main Layout */
        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        .page-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .page-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        @media (max-width: 640px) {
            .cards-grid { grid-template-columns: 1fr; }
            .main { padding: 20px 16px; }
            .top-nav { padding: 10px 16px; }
            .top-nav .time { display: none; }
            .checkin-status-row { flex-direction: column; gap: 8px; align-items: center; }
        }
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .card-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .card-icon.face { background: var(--accent-light); color: var(--accent); }
        .card-icon.location { background: var(--success-light); color: var(--success); }
        .card-icon svg { width: 18px; height: 18px; }
        .card-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
        .card-subtitle { font-size: 12px; color: var(--text-tertiary); }

        /* Camera */
        .camera-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: var(--bg-elevated);
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 12px;
            border: 1px solid var(--border-subtle);
        }
        .camera-container video,
        .camera-container canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .camera-container .placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            font-size: 13px;
            gap: 8px;
        }
        .camera-overlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .camera-overlay.active { display: flex; }
        .capture-preview {
            display: none;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-surface);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            line-height: 1.5;
        }
        .btn:hover { background: var(--bg-elevated); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: none;
        }
        .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
        .btn-success {
            background: var(--success);
            color: #fff;
            border: none;
        }
        .btn-success:hover:not(:disabled) { background: #047857; }
        .btn-group { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }

        /* Location Display */
        .location-info {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 20px;
            text-align: center;
            margin-bottom: 12px;
        }
        .location-info .coords {
            font-family: 'SF Mono', 'PingFang SC', monospace;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .location-info .accuracy {
            font-size: 12px;
            color: var(--text-tertiary);
        }
        .location-placeholder {
            color: var(--text-tertiary);
            font-size: 13px;
            padding: 32px;
            text-align: center;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }
        .status-badge svg { width: 12px; height: 12px; flex-shrink: 0; }
        .status-badge.waiting { background: var(--bg-elevated); color: var(--text-tertiary); }
        .status-badge.success { background: var(--success-light); color: var(--success); }
        .status-badge.error { background: var(--error-light); color: var(--error); }
        .status-badge.loading { background: var(--warning-light); color: var(--warning); }

        /* Check-in Button Area */
        .checkin-area {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .checkin-status-row {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 20px;
        }
        .checkin-status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .checkin-status-item svg { width: 14px; height: 14px; flex-shrink: 0; }
        .btn-checkin {
            padding: 14px 48px;
            font-size: 16px;
            font-weight: 600;
            border-radius: var(--radius-md);
            background: var(--accent);
            border: none;
            color: #fff;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            letter-spacing: 0.05em;
        }
        .btn-checkin:hover:not(:disabled) { background: var(--accent-hover); }
        .btn-checkin:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-checkin:active:not(:disabled) { transform: scale(0.98); }
        .checkin-hint {
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* Result Overlay */
        .result-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .result-overlay.active { display: flex; }
        .result-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: var(--shadow-md);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .result-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            font-weight: 700;
        }
        .result-icon.success { background: var(--success-light); color: var(--success); }
        .result-icon.error { background: var(--error-light); color: var(--error); }
        .result-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); }
        .result-msg { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
        .result-details { text-align: left; margin-bottom: 24px; }
        .result-detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-subtle);
            font-size: 13px;
            color: var(--text-primary);
        }
        .result-detail-item:last-child { border-bottom: none; }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            z-index: 200;
            transform: translateX(120%);
            transition: transform 0.3s ease;
        }
        .toast.show { transform: translateX(0); }
        .toast.error { background: var(--error-light); color: var(--error); border: 1px solid rgba(220,38,38,0.2); }
        .toast.success { background: var(--success-light); color: var(--success); border: 1px solid rgba(5,150,105,0.2); }

        /* Student Info Bar */
        .student-info-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 10px 24px;
            background: var(--accent-light);
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            color: var(--text-secondary);
        }
        .student-info-bar strong {
            color: var(--text-primary);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Top Navigation -->
    <nav class="top-nav">
        <a href="/" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M10.354 3.354a.5.5 0 0 0-.708-.708l-5 5a.5.5 0 0 0 0 .708l5 5a.5.5 0 0 0 .708-.708L5.707 8l4.647-4.646z"/></svg>
            返回
        </a>
        <span class="title">寝室签到</span>
        <div class="nav-right">
            <span class="time" id="currentTime"></span>
            <div class="theme-toggle" id="themeToggle" title="切换主题">
                <span class="theme-option" data-theme="light">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </span>
                <span class="theme-option" data-theme="dark">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </span>
                <span class="theme-option" data-theme="system">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                </span>
            </div>
        </div>
    </nav>

    <!-- Student Info Bar -->
    <div class="student-info-bar">
        <span>当前用户: <strong id="displayName"></strong></span>
        <span>学号: <strong id="displayStudentId"></strong></span>
    </div>

    <!-- Main Content -->
    <div class="main">
        <div class="page-header">
            <h1>签到打卡</h1>
            <p>请完成人脸识别和定位验证后进行签到</p>
        </div>

        <div class="cards-grid">
            <!-- Face Recognition Card -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon face">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                            <circle cx="12" cy="13" r="4"/>
                        </svg>
                    </div>
                    <div>
                        <div class="card-title">人脸识别</div>
                        <div class="card-subtitle">请正对摄像头拍摄</div>
                    </div>
                    <div style="margin-left:auto">
                        <span class="status-badge waiting" id="faceStatus">待拍摄</span>
                    </div>
                </div>
                <div class="camera-container" id="cameraContainer">
                    <video id="cameraVideo" autoplay playsinline style="display:none"></video>
                    <canvas id="captureCanvas" style="display:none"></canvas>
                    <img class="capture-preview" id="capturePreview">
                    <div class="placeholder" id="cameraPlaceholder">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                            <circle cx="12" cy="13" r="4"/>
                        </svg>
                        <span>点击下方按钮开启摄像头</span>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn" id="btnStartCamera" onclick="startCamera()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                        开启摄像头
                    </button>
                    <button class="btn btn-primary" id="btnCapture" onclick="capturePhoto()" disabled>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                        拍照
                    </button>
                    <button class="btn" id="btnRetake" onclick="retakePhoto()" style="display:none">
                        重拍
                    </button>
                </div>
            </div>

            <!-- Location Card -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon location">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="10" r="3"/>
                            <path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/>
                        </svg>
                    </div>
                    <div>
                        <div class="card-title">GPS 定位</div>
                        <div class="card-subtitle">请允许浏览器获取位置</div>
                    </div>
                    <div style="margin-left:auto">
                        <span class="status-badge waiting" id="locationStatus">待定位</span>
                    </div>
                </div>
                <div id="locationDisplay">
                    <div class="location-placeholder" id="locationPlaceholder">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3" style="display:block;margin:0 auto 8px">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 2a14.5 14.5 0 0 1 0 20 14.5 14.5 0 0 1 0-20"/>
                            <path d="M2 12h20"/>
                        </svg>
                        <span>点击下方按钮获取当前位置</span>
                    </div>
                    <div class="location-info" id="locationInfo" style="display:none">
                        <div class="coords" id="coordsText"></div>
                        <div class="accuracy" id="accuracyText"></div>
                    </div>
                    <div id="mapContainer" style="display:none; height:200px; margin-top:12px; border-radius:8px; overflow:hidden;"></div>
                </div>
                <div class="btn-group">
                    <button class="btn" id="btnGetLocation" onclick="getLocation()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg>
                        获取定位
                    </button>
                </div>
            </div>
        </div>

        <!-- Check-in Button Area -->
        <div class="checkin-area">
            <div class="checkin-status-row">
                <div class="checkin-status-item">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> 人脸:
                    <span class="status-badge waiting" id="faceStatusBottom">待拍摄</span>
                </div>
                <div class="checkin-status-item">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/></svg> 定位:
                    <span class="status-badge waiting" id="locationStatusBottom">待定位</span>
                </div>
            </div>
            <button class="btn-checkin" id="btnCheckin" onclick="doCheckin()" disabled>
                签 到
            </button>
            <p class="checkin-hint">人脸 + 定位双重验证通过后即可签到</p>
        </div>
    </div>

    <!-- Result Overlay -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-card">
            <div class="result-icon" id="resultIcon"></div>
            <div class="result-title" id="resultTitle"></div>
            <div class="result-msg" id="resultMsg"></div>
            <div class="result-details" id="resultDetails"></div>
            <button class="btn btn-primary" onclick="closeResult()" style="min-width:120px">确定</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ========== Theme ==========
        (function() {
            const saved = localStorage.getItem('theme') || 'light';
            applyTheme(saved);
        })();

        function applyTheme(mode) {
            if (mode === 'system') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', mode);
            }
            localStorage.setItem('theme', mode);
            updateThemeToggle(mode);
        }

        function updateThemeToggle(mode) {
            document.querySelectorAll('#themeToggle .theme-option').forEach(el => {
                el.classList.toggle('active', el.dataset.theme === mode);
            });
        }

        document.getElementById('themeToggle').addEventListener('click', function(e) {
            const el = e.target.closest('.theme-option');
            if (!el) return;
            const modes = ['light', 'dark', 'system'];
            const idx = modes.indexOf(el.dataset.theme);
            const next = modes[(idx + 1) % 3];
            applyTheme(next);
        });

        // ========== SVG icon helpers ==========
        function statusIcon(type) {
            switch (type) {
                case 'success':
                    return '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
                case 'error':
                    return '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
                case 'loading':
                    return '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spinner-icon"><circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="32"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="0.8s" repeatCount="indefinite"/></circle></svg>';
                case 'waiting':
                default:
                    return '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
            }
        }

        // ========== State ==========
        let faceImageData = null;
        let latitude = null;
        let longitude = null;
        let stream = null;
        let studentId = null;

        // School range constants
        const SCHOOL_LAT = 30.0168;
        const SCHOOL_LNG = 122.1072;
        const SCHOOL_RADIUS = 500; // meters

        // ========== Init ==========
        window.addEventListener('DOMContentLoaded', async () => {
            updateTime();
            setInterval(updateTime, 1000);
            try {
                const resp = await fetch('/auth/check');
                const data = await resp.json();
                if (!data.loggedIn) {
                    window.location.href = '/login';
                    return;
                }
                studentId = data.studentId;
                document.getElementById('displayStudentId').textContent = data.studentId;
                document.getElementById('displayName').textContent = data.studentName || '';
            } catch (e) {
                window.location.href = '/login';
            }
        });

        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent =
                now.toLocaleString('zh-CN', { hour12: false });
        }

        // ========== Camera ==========
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                const video = document.getElementById('cameraVideo');
                video.srcObject = stream;
                video.style.display = 'block';
                document.getElementById('cameraPlaceholder').style.display = 'none';
                document.getElementById('capturePreview').style.display = 'none';
                document.getElementById('btnCapture').disabled = false;
                document.getElementById('btnStartCamera').disabled = true;
                document.getElementById('btnRetake').style.display = 'none';
            } catch (err) {
                showToast('无法访问摄像头: ' + err.message, 'error');
            }
        }

        function capturePhoto() {
            const video = document.getElementById('cameraVideo');
            const canvas = document.getElementById('captureCanvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            faceImageData = canvas.toDataURL('image/png');

            const preview = document.getElementById('capturePreview');
            preview.src = faceImageData;
            preview.style.display = 'block';
            video.style.display = 'none';

            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }

            updateFaceStatus('success', '已拍摄');
            document.getElementById('btnCapture').disabled = true;
            document.getElementById('btnStartCamera').disabled = false;
            document.getElementById('btnRetake').style.display = 'inline-flex';
            document.getElementById('btnStartCamera').innerHTML = '重新拍摄';
            updateCheckinButton();
        }

        function retakePhoto() {
            faceImageData = null;
            updateFaceStatus('waiting', '待拍摄');
            document.getElementById('capturePreview').style.display = 'none';
            document.getElementById('btnRetake').style.display = 'none';
            document.getElementById('btnStartCamera').innerHTML = '开启摄像头';
            updateCheckinButton();
            startCamera();
        }

        // ========== Location ==========
        function getLocation() {
            if (!navigator.geolocation) {
                showToast('浏览器不支持定位功能', 'error');
                return;
            }
            updateLocationStatus('loading', '定位中...');
            document.getElementById('btnGetLocation').disabled = true;

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    latitude = pos.coords.latitude;
                    longitude = pos.coords.longitude;
                    const accuracy = pos.coords.accuracy;

                    // Check school range using Haversine formula
                    const distance = haversineDistance(latitude, longitude, SCHOOL_LAT, SCHOOL_LNG);

                    document.getElementById('locationPlaceholder').style.display = 'none';
                    document.getElementById('locationInfo').style.display = 'block';

                    if (distance > SCHOOL_RADIUS) {
                        document.getElementById('coordsText').textContent =
                            `${latitude.toFixed(6)}, ${longitude.toFixed(6)}`;
                        document.getElementById('accuracyText').textContent =
                            `距离学校 ${distance.toFixed(0)}m — 不在学校范围内，无法签到！`;
                        document.getElementById('accuracyText').style.color = 'var(--error)';
                        updateLocationStatus('error', '不在学校范围');
                        showToast('不在学校范围内，无法签到！', 'error');
                        latitude = null;
                        longitude = null;
                    } else {
                        document.getElementById('coordsText').textContent =
                            `${latitude.toFixed(6)}, ${longitude.toFixed(6)}`;
                        document.getElementById('accuracyText').textContent =
                            `精度: ±${accuracy.toFixed(0)}m | 距学校: ${distance.toFixed(0)}m`;
                        document.getElementById('accuracyText').style.color = 'var(--success)';
                        updateLocationStatus('success', '已定位');
                    }

                    // Show map
                    try {
                        if (typeof BMap !== 'undefined') {
                            const mapDiv = document.getElementById('mapContainer');
                            mapDiv.style.display = 'block';
                            const map = new BMap.Map(mapDiv);
                            const point = new BMap.Point(pos.coords.longitude, pos.coords.latitude);
                            map.centerAndZoom(point, 16);
                            map.addControl(new BMap.NavigationControl());
                            const marker = new BMap.Marker(point);
                            map.addOverlay(marker);
                            const circle = new BMap.Circle(new BMap.Point(SCHOOL_LNG, SCHOOL_LAT), SCHOOL_RADIUS, {
                                strokeColor: '#2563EB', strokeWeight: 2, fillColor: '#EFF6FF', fillOpacity: 0.3
                            });
                            map.addOverlay(circle);
                        }
                    } catch (mapErr) {
                        console.warn('Map load failed:', mapErr);
                    }

                    document.getElementById('btnGetLocation').disabled = false;
                    document.getElementById('btnGetLocation').innerHTML = '重新定位';
                    updateCheckinButton();
                },
                (err) => {
                    let msg = '定位失败';
                    if (err.code === 1) msg = '请允许浏览器获取位置';
                    if (err.code === 2) msg = '无法获取位置信息';
                    if (err.code === 3) msg = '定位超时，请重试';
                    updateLocationStatus('error', msg);
                    document.getElementById('btnGetLocation').disabled = false;
                    showToast(msg, 'error');
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // ========== Status Updates ==========
        function updateFaceStatus(type, text) {
            const badges = [document.getElementById('faceStatus'), document.getElementById('faceStatusBottom')];
            badges.forEach(badge => {
                badge.className = 'status-badge ' + type;
                badge.innerHTML = statusIcon(type) + ' ' + text;
            });
        }

        function updateLocationStatus(type, text) {
            const badges = [document.getElementById('locationStatus'), document.getElementById('locationStatusBottom')];
            badges.forEach(badge => {
                badge.className = 'status-badge ' + type;
                badge.innerHTML = statusIcon(type) + ' ' + text;
            });
        }

        function updateCheckinButton() {
            const btn = document.getElementById('btnCheckin');
            btn.disabled = !(faceImageData && latitude !== null && longitude !== null);
        }

        // ========== Check-in ==========
        async function doCheckin() {
            const btn = document.getElementById('btnCheckin');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 验证中...';

            try {
                const resp = await fetch('/checkin/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        faceImageData: faceImageData,
                        latitude: latitude,
                        longitude: longitude
                    })
                });
                const data = await resp.json();
                showResult(data);
            } catch (err) {
                showResult({
                    success: false,
                    message: '网络错误: ' + err.message,
                    faceVerified: false,
                    locationVerified: false
                });
            } finally {
                btn.disabled = false;
                btn.innerHTML = '签 到';
            }
        }

        function showResult(data) {
            const overlay = document.getElementById('resultOverlay');
            const icon = document.getElementById('resultIcon');
            const title = document.getElementById('resultTitle');
            const msg = document.getElementById('resultMsg');
            const details = document.getElementById('resultDetails');

            if (data.success) {
                icon.className = 'result-icon success';
                icon.innerHTML = '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
                title.textContent = '签到成功！';
                title.style.color = 'var(--success)';
            } else {
                icon.className = 'result-icon error';
                icon.innerHTML = '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
                title.textContent = '签到失败';
                title.style.color = 'var(--error)';
            }
            msg.textContent = data.message || '';

            details.replaceChildren();
            addDetailItem(details, '人脸识别', data.faceVerified ? '通过' : '未通过', data.faceVerified ? 'success' : 'error');
            addDetailItem(details, 'GPS 定位', data.locationVerified ? '通过' : '未通过', data.locationVerified ? 'success' : 'error');
            addDetailItem(details, '学号', studentId || '-', null);
            addDetailItem(details, '时间', new Date().toLocaleString('zh-CN'), null);

            overlay.classList.add('active');
        }

        function addDetailItem(container, label, value, badgeClass) {
            const item = document.createElement('div');
            item.className = 'result-detail-item';

            const labelSpan = document.createElement('span');
            labelSpan.textContent = label;

            const valueSpan = document.createElement('span');
            if (badgeClass) {
                valueSpan.className = 'status-badge ' + badgeClass;
            } else {
                valueSpan.style.color = 'var(--text-secondary)';
            }
            valueSpan.textContent = value;

            item.appendChild(labelSpan);
            item.appendChild(valueSpan);
            container.appendChild(item);
        }

        function closeResult() {
            document.getElementById('resultOverlay').classList.remove('active');
            // Reset state
            faceImageData = null;
            latitude = null;
            longitude = null;
            if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
            // Reset UI
            document.getElementById('cameraVideo').style.display = 'none';
            document.getElementById('capturePreview').style.display = 'none';
            document.getElementById('cameraPlaceholder').style.display = 'flex';
            document.getElementById('locationPlaceholder').style.display = 'block';
            document.getElementById('locationInfo').style.display = 'none';
            document.getElementById('mapContainer').style.display = 'none';
            document.getElementById('btnCapture').disabled = true;
            document.getElementById('btnStartCamera').disabled = false;
            document.getElementById('btnStartCamera').innerHTML = '开启摄像头';
            document.getElementById('btnRetake').style.display = 'none';
            document.getElementById('btnGetLocation').innerHTML = '获取定位';
            updateFaceStatus('waiting', '待拍摄');
            updateLocationStatus('waiting', '待定位');
            updateCheckinButton();
        }

        // ========== Toast ==========
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>

    <!-- Baidu Map API -->
    <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=A5MRV7AuOymgp5TILlQVMwuENBZv1Buh"></script>
</body>
