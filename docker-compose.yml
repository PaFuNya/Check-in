version: '3.8'
services:
  redis:
    image: redis:7-alpine
    container_name: 1Panel-redis-checkin
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - /opt/1panel/apps/redis-checkin/data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
