version: '3.8'

services:
  campus-checkin:
    build: .
    container_name: campus-checkin
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/checkin_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:-pafunya@520wuerwu}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-sk-336...8f14}
      - JAVA_OPTS=-Xmx256m -Xms128m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
