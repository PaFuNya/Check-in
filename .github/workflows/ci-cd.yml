# 校园寝室自助签到系统 CI/CD Pipeline
# Gitee Go / GitHub Actions 兼容配置

name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: 编译构建
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: 缓存 Maven 依赖
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        
    - name: 编译
      run: mvn compile -q
      
    - name: 打包
      run: mvn package -DskipTests -q
      
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: target/campus-checkin-assistant-1.0-SNAPSHOT.jar

  test:
    name: 自动化测试
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: 下载构建产物
      uses: actions/download-artifact@v4
      with:
        name: app-jar
        path: target/
        
    - name: 启动应用
      run: |
        java -jar target/campus-checkin-assistant-1.0-SNAPSHOT.jar --server.port=8088 &
        sleep 30
        
    - name: 健康检查
      run: |
        HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8088/login)
        if [ "$HTTP_CODE" != "200" ]; then
          echo "健康检查失败: HTTP $HTTP_CODE"
          exit 1
        fi
        echo "健康检查通过"
        
    - name: API 测试
      run: |
        # 登录测试
        LOGIN=$(curl -s -X POST http://127.0.0.1:8088/auth/login \
          -H 'Content-Type: application/json' \
          -d '{"studentId":"2024001","password":"123456","rememberMe":false}')
        echo "登录: $LOGIN"
        
        # 页面路由测试
        for path in /login / /checkin; do
          CODE=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8088$path)
          if [ "$CODE" != "200" ]; then
            echo "路由 $path 失败: HTTP $CODE"
            exit 1
          fi
        done
        echo "API 测试通过"
