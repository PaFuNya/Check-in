<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寝室签到助手</title>
    <style>
        :root, [data-theme="light"] {
            --bg: #F7F6F3; --bg-card: #FFFFFF; --bg-hover: #F9F9F8;
            --text: #1a1a1a; --text2: #6b7280; --text3: #9ca3af;
            --border: #E5E5E3; --accent: #2563EB; --accent-hover: #1d4ed8;
            --success: #059669; --success-bg: #ECFDF5;
            --error: #DC2626; --shadow: 0 2px 8px rgba(0,0,0,0.06); --radius: 12px;
            --shadow-lg: 0 4px 24px rgba(0,0,0,0.06);
            --glass-bg: rgba(255,255,255,0.72);
            --glass-border: 1px solid rgba(255,255,255,0.5);
        }
        [data-theme="dark"] {
            --bg: #0f0f0f; --bg-card: #1a1a1a; --bg-hover: #242424;
            --text: #f0f0f0; --text2: #9ca3af; --text3: #6b7280;
            --border: #2a2a2a; --accent: #3b82f6; --accent-hover: #60a5fa;
            --success: #10b981; --success-bg: #064e3b;
            --error: #ef4444; --shadow: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-lg: 0 4px 24px rgba(0,0,0,0.3);
            --glass-bg: rgba(30,30,30,0.72);
            --glass-border: 1px solid rgba(255,255,255,0.08);
        }
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --bg: #0f0f0f; --bg-card: #1a1a1a; --bg-hover: #242424;
                --text: #f0f0f0; --text2: #9ca3af; --text3: #6b7280;
                --border: #2a2a2a; --accent: #3b82f6; --accent-hover: #60a5fa;
                --success: #10b981; --success-bg: #064e3b; --error: #ef4444;
                --shadow: 0 2px 8px rgba(0,0,0,0.3);
                --shadow-lg: 0 4px 24px rgba(0,0,0,0.3);
                --glass-bg: rgba(30,30,30,0.72);
                --glass-border: 1px solid rgba(255,255,255,0.08);
            }
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'SF Pro Display','PingFang SC',-apple-system,sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; position:relative; }

        /* Background gradient orbs */
        body::before {
            content: '';
            position: fixed;
            top: -20%; left: -10%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(37,99,235,0.15), transparent 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
            animation: orbFloat 8s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20%; right: -10%;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(16,185,129,0.1), transparent 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
            animation: orbFloat 10s ease-in-out infinite reverse;
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.05); }
        }

        /* Keyframes */
        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes breathe {
            0%, 100% { box-shadow: 0 8px 32px rgba(37,99,235,0.3), 0 0 0 0 rgba(37,99,235,0.4); }
            50% { box-shadow: 0 8px 32px rgba(37,99,235,0.3), 0 0 0 20px rgba(37,99,235,0); }
        }
        @keyframes scaleIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
        @keyframes slideDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        @keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

        /* Nav — glassmorphism */
        .nav { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; background:var(--glass-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:var(--glass-border); flex-shrink:0; box-shadow:0 1px 0 rgba(37,99,235,0.06); }
        .nav .title { font-size:18px; font-weight:700; }
        .nav-right { display:flex; align-items:center; gap:12px; }
        .nav .time { font-size:13px; color:var(--text3); font-variant-numeric:tabular-nums; }
        .nav .user { font-size:13px; color:var(--text2); }

        /* Theme toggle in nav */
        .theme-toggle {
            width: 36px; height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 16px;
            line-height: 1;
            flex-shrink: 0;
        }
        .theme-toggle:hover { transform:translateY(-1px); box-shadow:var(--shadow-lg); border-color:var(--accent); }
        .theme-toggle:active { transform:scale(0.95); }
        .theme-toggle .icon-sun, .theme-toggle .icon-moon, .theme-toggle .icon-system { display:none; }
        .theme-toggle[data-mode="light"] .icon-sun { display:block; }
        .theme-toggle[data-mode="dark"] .icon-moon { display:block; }
        .theme-toggle[data-mode="system"] .icon-system { display:block; }
        .theme-toggle svg {
            width: 18px; height: 18px;
            stroke: currentColor; fill: none;
            stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
        }

        .logout-btn { padding:6px 14px; border-radius:8px; border:1px solid var(--border); background:var(--bg-card); color:var(--error); font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.2s ease; }
        .logout-btn:hover { transform:translateY(-1px); box-shadow:var(--shadow); }
        .logout-btn:active { transform:scale(0.97); }

        /* Main area */
        .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

        /* Hero - checkin button area */
        .hero { flex-shrink:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:36px 24px 28px; }
        .hero .greeting { font-size:22px; font-weight:700; margin-bottom:4px; animation:fadeInUp 0.5s ease-out; }
        .hero .sub { font-size:14px; color:var(--text2); margin-bottom:24px; animation:fadeInUp 0.5s ease-out 0.05s both; }

        /* Circular checkin button — breathing glow */
        .checkin-circle { width:130px; height:130px; border-radius:50%; background:linear-gradient(135deg, var(--accent), #1d4ed8); color:#fff; border:none; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; transition:all 0.3s ease; animation:breathe 2.5s ease-in-out infinite, fadeInUp 0.5s ease-out 0.1s both; }
        .checkin-circle:hover { transform:scale(1.05); animation:fadeInUp 0.5s ease-out 0.1s both; }
        .checkin-circle:active { transform:scale(0.95); }
        .checkin-circle .icon { font-size:32px; }
        .checkin-circle .label { font-size:15px; font-weight:600; }
        .checkin-circle .sub-label { font-size:11px; opacity:0.8; }

        /* Quick actions */
        .quick-actions { display:flex; gap:12px; margin-top:18px; }
        .quick-btn { padding:8px 20px; border-radius:999px; border:1px solid var(--border); background:var(--glass-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); color:var(--text); font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.2s ease; }
        .quick-btn:hover { background:var(--bg-hover); border-color:var(--accent); color:var(--accent); transform:translateY(-1px); box-shadow:var(--shadow); }
        .quick-btn:active { transform:scale(0.97); }

        /* Chat area — glassmorphism */
        .chat-section { flex:1; display:flex; flex-direction:column; border-top:var(--glass-border); background:var(--glass-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); min-height:0; }
        .chat-header { padding:12px 20px; font-size:14px; font-weight:600; border-bottom:1px solid var(--border); flex-shrink:0; display:flex; align-items:center; gap:8px; }
        .chat-header .dot { width:8px; height:8px; border-radius:50%; background:var(--success); animation:pulse 2s infinite; }

        .chat-messages { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth; }

        /* Message bubble with name */
        .msg-wrap { display:flex; flex-direction:column; max-width:80%; animation:fadeInUp 0.3s ease-out; }
        .msg-wrap.user { align-self:flex-end; align-items:flex-end; }
        .msg-wrap.bot { align-self:flex-start; align-items:flex-start; }

        .msg-name { font-size:11px; color:var(--text3); margin-bottom:4px; padding:0 4px; }
        .msg-wrap.user .msg-name { color:var(--accent); }

        .msg { padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.7; word-break:break-word; }
        .msg-wrap.user .msg { background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
        .msg-wrap.bot .msg { background:var(--bg); color:var(--text); border-bottom-left-radius:4px; border:1px solid var(--border); }

        .msg-time { font-size:10px; color:var(--text3); margin-top:4px; padding:0 4px; }

        /* Typing indicator */
        .typing { display:flex; gap:4px; padding:12px 16px; }
        .typing span { width:6px; height:6px; border-radius:50%; background:var(--text3); animation:typing 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay:0.2s; }
        .typing span:nth-child(3) { animation-delay:0.4s; }

        .chat-input-area { padding:12px 20px; border-top:1px solid var(--border); display:flex; gap:8px; flex-shrink:0; }
        .chat-input { flex:1; padding:10px 14px; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:14px; font-family:inherit; outline:none; transition:all 0.2s ease; }
        .chat-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,0.15), 0 0 20px rgba(37,99,235,0.08); transform:scale(1.01); }
        .chat-send { padding:10px 20px; border-radius:10px; border:none; background:var(--accent); color:#fff; font-size:14px; font-weight:500; cursor:pointer; font-family:inherit; transition:all 0.2s ease; }
        .chat-send:hover { background:var(--accent-hover); transform:translateY(-1px); box-shadow:0 4px 12px rgba(37,99,235,0.3); }
        .chat-send:active { transform:scale(0.97); }

        /* Toast — slide in from top */
        .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-20px); padding:10px 24px; border-radius:10px; font-size:14px; z-index:999; opacity:0; transition:opacity 0.3s, transform 0.3s; pointer-events:none; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast.success { background:var(--success-bg); color:var(--success); border:1px solid var(--success); }
        .toast.error { background:#FEF2F2; color:var(--error); border:1px solid var(--error); }
        .toast.info { background:#EFF6FF; color:var(--accent); border:1px solid var(--accent); }

        /* Profile modal */
        .profile-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; z-index:200; }
        .profile-overlay.show { display:flex; }
        .profile-card { background:var(--glass-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:var(--glass-border); border-radius:16px; padding:32px; max-width:420px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,0.2); animation:scaleIn 0.3s ease-out; }
        .profile-card h3 { font-size:18px; font-weight:600; margin-bottom:20px; text-align:center; }
        .profile-field { margin-bottom:14px; }
        .profile-field label { display:block; font-size:12px; color:var(--text2); margin-bottom:4px; font-weight:500; }
        .profile-field input { width:100%; padding:9px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:13px; font-family:inherit; outline:none; transition:all 0.2s ease; }
        .profile-field input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,0.15); }
        .profile-field input:read-only { opacity:0.6; cursor:default; }
        .profile-field input:read-only:focus { border-color:var(--border); box-shadow:none; }
        .profile-actions { display:flex; gap:8px; margin-top:20px; justify-content:flex-end; }
        .profile-actions .btn { padding:8px 20px; border-radius:8px; border:1px solid var(--border); background:var(--bg-card); color:var(--text); font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.2s ease; }
        .profile-actions .btn:hover { transform:translateY(-1px); box-shadow:var(--shadow); }
        .profile-actions .btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
        .profile-actions .btn.primary:hover { background:var(--accent-hover); }
    </style>
</head>
<body>
    <!-- Nav -->
    <div class="nav">
        <div class="title">寝室签到助手</div>
        <div class="nav-right">
            <span class="time" id="clock"></span>
            <span class="user" id="userName" onclick="openProfile()" title="点击查看/编辑个人信息"></span>
            <button class="theme-toggle" id="themeToggle" data-mode="light" aria-label="切换主题" title="切换主题模式">
                <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="icon-system" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            </button>
            <button class="logout-btn" onclick="logout()">退出</button>
        </div>
    </div>

    <div class="main">
        <!-- Hero with circular checkin button -->
        <div class="hero">
            <div class="greeting" id="greeting">你好</div>
            <div class="sub">欢迎使用寝室自助签到系统</div>
            <button class="checkin-circle" onclick="goCheckin()">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:32px;height:32px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <span class="label">查寝签到</span>
                <span class="sub-label">点击开始签到</span>
            </button>
            <div class="quick-actions">
                <button class="quick-btn" onclick="showRecords()">签到记录</button>
                <button class="quick-btn" onclick="document.getElementById('chatInput').focus()">咨询问题</button>
            </div>
        </div>

        <!-- Chat Section -->
        <div class="chat-section">
            <div class="chat-header">
                <span class="dot"></span>
                寝室守则咨询 - AI 助手
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="msg-wrap bot">
                    <span class="msg-name">AI助手</span>
                    <div class="msg">你好！我是寝室守则 AI 助手<br>你可以问我关于寝室管理、作息时间、卫生检查、报修流程等问题。<br>也可以直接查询签到记录哦</div>
                    <span class="msg-time">刚刚</span>
                </div>
            </div>
            <div class="chat-input-area">
                <input class="chat-input" id="chatInput" placeholder="输入寝室相关问题..." onkeydown="if(event.key==='Enter')sendChat()">
                <button class="chat-send" onclick="sendChat()">发送</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Profile Modal -->
    <div class="profile-overlay" id="profileOverlay">
        <div class="profile-card">
            <h3>个人信息设置</h3>
            <div class="profile-field">
                <label>学号</label>
                <input type="text" id="profileStudentId" readonly>
            </div>
            <div class="profile-field">
                <label>姓名</label>
                <input type="text" id="profileStudentName" readonly>
            </div>
            <div class="profile-field">
                <label>班级</label>
                <input type="text" id="profileClassName" placeholder="请输入班级">
            </div>
            <div class="profile-field">
                <label>手机号码</label>
                <input type="text" id="profilePhone" placeholder="请输入手机号码">
            </div>
            <div style="text-align:center;margin-bottom:16px;">
                <div onclick="document.getElementById('avatarFile').click()" style="width:72px;height:72px;border-radius:50%;margin:0 auto 6px;background:var(--bg);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:all 0.2s;">
                    <img id="avatarImg" style="display:none;width:100%;height:100%;object-fit:cover;">
                    <span id="avatarPH" style="font-size:11px;color:var(--text3);">点击上传</span>
                </div>
                <input type="file" id="avatarFile" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
                <div style="font-size:10px;color:var(--text3);">点击头像更换</div>
            </div>
            <div class="profile-actions">
                <button class="btn" onclick="closeProfile()">取消</button>
                <button class="btn primary" onclick="saveProfile()">保存</button>
            </div>
        </div>
    </div>

<script>
/* ===== Theme Management ===== */
(function() {
    const MODES = ['light', 'dark', 'system'];
    const toggle = document.getElementById('themeToggle');

    function applyTheme(mode) {
        if (mode === 'system') {
            document.documentElement.removeAttribute('data-theme');
        } else {
            document.documentElement.setAttribute('data-theme', mode);
        }
        localStorage.setItem('theme', mode);
        toggle.setAttribute('data-mode', mode);
    }

    function initTheme() {
        var saved = localStorage.getItem('theme') || 'light';
        applyTheme(saved);
    }

    toggle.addEventListener('click', function() {
        var current = toggle.getAttribute('data-mode');
        var idx = MODES.indexOf(current);
        var next = MODES[(idx + 1) % MODES.length];
        applyTheme(next);
    });

    initTheme();
})();

let studentId = null, studentName = null;

document.addEventListener('DOMContentLoaded', async () => {
    updateClock(); setInterval(updateClock, 1000);
    try {
        const r = await fetch('/auth/check');
        if (!r.ok) { location.href='/login'; return; }
        const d = await r.json();
        if (!d.loggedIn) { location.href='/login'; return; }
        studentId = d.studentId; studentName = d.studentName;
        document.getElementById('userName').textContent = studentName || studentId;
        const h = new Date().getHours();
        const greet = h < 12 ? '早上好' : h < 18 ? '下午好' : '晚上好';
        document.getElementById('greeting').textContent = greet + '，' + (studentName || '') + '！';
    } catch(e) { location.href='/login'; }
});

function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN',{hour12:false});
}

function goCheckin() { location.href = '/checkin'; }

async function showRecords() {
    if (!studentId) { toast('请先登录','error'); return; }
    const wrap = addMsg('查询我的签到记录', 'user', studentName || '我');
    const botWrap = addMsg('', 'bot', 'AI助手', true);
    try {
        const resp = await fetch('/ai/check-in-records?studentId=' + encodeURIComponent(studentId));
        const records = await resp.json();
        let html = '';
        if (!records || records.length === 0) {
            html = '暂无签到记录';
        } else {
            html = '<b>你的签到记录：</b><br><br>';
            records.forEach((r, i) => {
                const time = r.checkTime ? new Date(r.checkTime).toLocaleString('zh-CN') : '未知';
                html += `${i+1}. ${r.status} | ${time}<br>`;
                if (r.locationInfo) html += `&nbsp;&nbsp;${r.locationInfo}<br>`;
            });
        }
        botWrap.querySelector('.msg').innerHTML = html;
    } catch(err) {
        botWrap.querySelector('.msg').innerHTML = '查询失败，请重试';
    }
    scrollChat();
}

// ========== Chat ==========
let chatBusy = false;

async function sendChat() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg || chatBusy) return;
    input.value = '';
    addMsg(msg, 'user', studentName || '我');

    // Show typing indicator
    const botWrap = document.createElement('div');
    botWrap.className = 'msg-wrap bot';
    botWrap.innerHTML = `
        <span class="msg-name">AI助手</span>
        <div class="msg"><div class="typing"><span></span><span></span><span></span></div></div>
    `;
    document.getElementById('chatMessages').appendChild(botWrap);
    scrollChat();
    chatBusy = true;

    try {
        const url = '/ai/chat-stream?message=' + encodeURIComponent(msg) + '&userId=' + encodeURIComponent(studentId || '111');
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);

        // Read as plain text (backend returns plain text, not SSE)
        const text = await resp.text();
        const msgEl = botWrap.querySelector('.msg');
        if (text && text.trim()) {
            msgEl.innerHTML = text.replace(/\n/g, '<br>');
        } else {
            msgEl.innerHTML = '暂无回复，请换个方式提问';
            msgEl.style.color = 'var(--text3)';
        }
    } catch(err) {
        const msgEl = botWrap.querySelector('.msg');
        msgEl.innerHTML = '网络异常，请重试';
        msgEl.style.color = 'var(--error)';
    }
    chatBusy = false;
    scrollChat();
}

function addMsg(text, cls, name, noTime) {
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap ' + cls;
    let html = '';
    if (name) html += '<span class="msg-name">' + name + '</span>';
    html += '<div class="msg">' + text + '</div>';
    if (!noTime) html += '<span class="msg-time">' + new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) + '</span>';
    wrap.innerHTML = html;
    document.getElementById('chatMessages').appendChild(wrap);
    scrollChat();
    return wrap;
}

function scrollChat() {
    const el = document.getElementById('chatMessages');
    el.scrollTop = el.scrollHeight;
}

function toast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast ' + (type||'info') + ' show';
    setTimeout(() => t.classList.remove('show'), 3000);
}

async function openProfile() {
    try {
        const r = await fetch('/auth/profile');
        const d = await r.json();
        if (d.success) {
            document.getElementById('profileStudentId').value = d.studentId || '';
            document.getElementById('profileStudentName').value = d.studentName || '';
            document.getElementById('profileClassName').value = d.className || '';
            document.getElementById('profilePhone').value = d.phoneNumber || '';
            if (d.avatarUrl && d.avatarUrl !== '') { document.getElementById('avatarImg').src = d.avatarUrl; document.getElementById('avatarImg').style.display = 'block'; document.getElementById('avatarPH').style.display = 'none'; }
        }
    } catch(e) { toast('加载个人信息失败', 'error'); }
    document.getElementById('profileOverlay').classList.add('show');
}

function closeProfile() {
    document.getElementById('profileOverlay').classList.remove('show');
}

async function saveProfile() {
    const className = document.getElementById('profileClassName').value.trim();
    const phoneNumber = document.getElementById('profilePhone').value.trim();
    const avatarUrl = '';
    try {
        const r = await fetch('/auth/profile', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({className, phoneNumber, avatarUrl})
        });
        const d = await r.json();
        if (d.success) {
            toast('保存成功', 'success');
            closeProfile();
        } else {
            toast(d.message || '保存失败', 'error');
        }
    } catch(e) { toast('保存失败', 'error'); }
}

async function logout() {
    await fetch('/auth/logout', {method:'POST'});
    location.href = '/login';
}

async function uploadAvatar(input) {
    const file = input.files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('file', file);
    try {
        const r = await fetch('/auth/avatar', {method:'POST', body: fd});
        const d = await r.json();
        if (d.success) {
            document.getElementById('avatarImg').src = d.avatarUrl;
            document.getElementById('avatarImg').style.display = 'block';
            document.getElementById('avatarPH').style.display = 'none';
            toast('头像已更新', 'success');
        } else {
            toast(d.message || '上传失败', 'error');
        }
    } catch(e) { toast('上传失败', 'error'); }
}
</script>
