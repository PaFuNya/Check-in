<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寝室签到</title>
    <style>
        :root, [data-theme="light"] {
            --bg: #F7F6F3; --bg-card: #FFFFFF; --bg-hover: #F9F9F8;
            --text: #1a1a1a; --text2: #6b7280; --text3: #9ca3af;
            --border: #E5E5E3; --accent: #2563EB; --accent-hover: #1d4ed8;
            --success: #059669; --success-bg: #ECFDF5;
            --error: #DC2626; --error-bg: #FEF2F2;
            --warning: #D97706; --warning-bg: #FFFBEB;
            --shadow: 0 2px 8px rgba(0,0,0,0.06); --radius: 16px;
            --shadow-lg: 0 4px 24px rgba(0,0,0,0.06);
            --glass-bg: rgba(255,255,255,0.72);
            --glass-border: 1px solid rgba(255,255,255,0.5);
        }
        [data-theme="dark"] {
            --bg: #0f0f0f; --bg-card: #1a1a1a; --bg-hover: #242424;
            --text: #f0f0f0; --text2: #9ca3af; --text3: #6b7280;
            --border: #2a2a2a; --accent: #3b82f6; --accent-hover: #60a5fa;
            --success: #10b981; --success-bg: #064e3b;
            --error: #ef4444; --error-bg: #450a0a;
            --warning: #f59e0b; --warning-bg: #451a03;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-lg: 0 4px 24px rgba(0,0,0,0.3);
            --glass-bg: rgba(30,30,30,0.72);
            --glass-border: 1px solid rgba(255,255,255,0.08);
        }
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --bg: #0f0f0f; --bg-card: #1a1a1a; --bg-hover: #242424;
                --text: #f0f0f0; --text2: #9ca3af; --text3: #6b7280;
                --border: #2a2a2a; --accent: #3b82f6; --accent-hover: #60a5fa;
                --success: #10b981; --success-bg: #064e3b;
                --error: #ef4444; --error-bg: #450a0a;
                --warning: #f59e0b; --warning-bg: #451a03;
                --shadow: 0 2px 8px rgba(0,0,0,0.3);
                --shadow-lg: 0 4px 24px rgba(0,0,0,0.3);
                --glass-bg: rgba(30,30,30,0.72);
                --glass-border: 1px solid rgba(255,255,255,0.08);
            }
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'SF Pro Display','PingFang SC',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; position:relative; }

        /* Background gradient orbs */
        body::before {
            content: '';
            position: fixed;
            top: -20%; left: -10%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(37,99,235,0.15), transparent 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
            animation: orbFloat 8s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20%; right: -10%;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(16,185,129,0.1), transparent 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
            animation: orbFloat 10s ease-in-out infinite reverse;
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.05); }
        }

        /* Keyframes */
        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes breathe {
            0%, 100% { box-shadow: 0 4px 20px rgba(37,99,235,0.3), 0 0 0 0 rgba(37,99,235,0.4); }
            50% { box-shadow: 0 4px 20px rgba(37,99,235,0.3), 0 0 0 18px rgba(37,99,235,0); }
        }
        @keyframes scaleIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
        @keyframes slideDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* Nav — glassmorphism */
        .nav { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; background:var(--glass-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:var(--glass-border); position:sticky; top:0; z-index:10; box-shadow:0 1px 0 rgba(37,99,235,0.06); }
        .nav-left { display:flex; align-items:center; gap:16px; }
        .nav a { color:var(--text2); text-decoration:none; font-size:14px; padding:6px 12px; border-radius:6px; transition:all 0.2s ease; }
        .nav a:hover { background:var(--bg-hover); transform:translateY(-1px); }
        .nav .title { font-size:16px; font-weight:600; }
        .nav .time { font-size:13px; color:var(--text3); font-variant-numeric:tabular-nums; }

        .nav-right { display:flex; align-items:center; gap:12px; }

        /* Theme toggle in nav */
        .theme-toggle {
            width: 36px; height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 16px;
            line-height: 1;
            flex-shrink: 0;
        }
        .theme-toggle:hover { transform:translateY(-1px); box-shadow:var(--shadow-lg); border-color:var(--accent); }
        .theme-toggle:active { transform:scale(0.95); }
        .theme-toggle .icon-sun, .theme-toggle .icon-moon, .theme-toggle .icon-system { display:none; }
        .theme-toggle[data-mode="light"] .icon-sun { display:block; }
        .theme-toggle[data-mode="dark"] .icon-moon { display:block; }
        .theme-toggle[data-mode="system"] .icon-system { display:block; }
        .theme-toggle svg {
            width: 18px; height: 18px;
            stroke: currentColor; fill: none;
            stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
        }

        .logout-btn { padding:6px 14px; border-radius:8px; border:1px solid var(--border); background:var(--bg-card); color:var(--error); font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.2s ease; }
        .logout-btn:hover { transform:translateY(-1px); box-shadow:var(--shadow); }
        .logout-btn:active { transform:scale(0.97); }

        /* Container */
        .container { max-width:560px; margin:0 auto; padding:24px 16px; }

        /* Status card — glassmorphism */
        .status-card { background:var(--glass-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:var(--glass-border); border-radius:var(--radius); padding:32px 24px; text-align:center; box-shadow:var(--shadow-lg); margin-bottom:20px; animation:fadeInUp 0.5s ease-out; }
        .status-card:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,0.1); transition:all 0.3s ease; }
        .status-icon { width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:28px; transition:transform 0.3s ease; }
        .status-icon.waiting { background:#F3F4F6; }
        .status-icon.loading { background:#EFF6FF; }
        .status-icon.success { background:var(--success-bg); }
        .status-icon.error { background:var(--error-bg); }
        .status-title { font-size:18px; font-weight:600; margin-bottom:8px; }
        .status-msg { font-size:14px; color:var(--text2); line-height:1.6; }
        .status-detail { font-size:12px; color:var(--text3); margin-top:8px; }

        /* Spinner */
        .spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
        .spinner-lg { width:40px; height:40px; border-width:3px; }

        /* Face card — glassmorphism */
        .face-card { background:var(--glass-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:var(--glass-border); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow-lg); margin-bottom:20px; animation:fadeInUp 0.5s ease-out 0.1s both; }
        .face-card:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,0.1); transition:all 0.3s ease; }
        .face-card.disabled { opacity:0.5; pointer-events:none; }
        .face-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
        .face-header .icon { width:36px; height:36px; border-radius:8px; background:#EFF6FF; display:flex; align-items:center; justify-content:center; font-size:18px; }
        .face-header .label { font-size:15px; font-weight:600; }
        .face-header .badge { margin-left:auto; font-size:12px; padding:3px 10px; border-radius:999px; }
        .badge.waiting { background:#F3F4F6; color:var(--text3); }
        .badge.loading { background:#EFF6FF; color:var(--accent); }
        .badge.success { background:var(--success-bg); color:var(--success); }
        .badge.error { background:var(--error-bg); color:var(--error); }

        /* Camera */
        .camera-box { position:relative; width:100%; aspect-ratio:4/3; background:#000; border-radius:8px; overflow:hidden; margin-bottom:12px; }
        .camera-box video, .camera-box img { width:100%; height:100%; object-fit:cover; }
        .camera-box .placeholder { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#999; font-size:13px; gap:8px; }

        /* Buttons */
        .btn-row { display:flex; gap:8px; }
        .btn { flex:1; padding:10px 16px; border-radius:10px; border:1px solid var(--border); background:var(--bg-card); color:var(--text); font-size:14px; font-weight:500; cursor:pointer; font-family:inherit; transition:all 0.2s ease; display:flex; align-items:center; justify-content:center; gap:6px; }
        .btn:hover { background:var(--bg-hover); transform:translateY(-1px); box-shadow:var(--shadow); }
        .btn:active { transform:scale(0.97); }
        .btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }
        .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
        .btn-primary:hover { background:var(--accent-hover); box-shadow:0 4px 12px rgba(37,99,235,0.3); }
        .btn-success { background:var(--success); color:#fff; border-color:var(--success); }

        /* Checkin button — breathing glow */
        .checkin-btn { width:100%; padding:14px; border-radius:12px; border:none; background:var(--accent); color:#fff; font-size:16px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.3s ease; margin-top:12px; animation:breathe 2.5s ease-in-out infinite; }
        .checkin-btn:hover { background:var(--accent-hover); transform:translateY(-1px); }
        .checkin-btn:active { transform:scale(0.97); }
        .checkin-btn:disabled { opacity:0.4; cursor:not-allowed; animation:none; transform:none; }
        .checkin-btn.success { background:var(--success); animation:none; }

        /* Register banner */
        .reg-banner { background:var(--warning-bg); border:1px solid #FDE68A; border-radius:8px; padding:12px 16px; margin-bottom:16px; font-size:13px; color:var(--warning); display:none; animation:fadeInUp 0.3s ease-out; }
        .reg-banner a { color:var(--accent); cursor:pointer; text-decoration:underline; }

        /* Toast — slide in */
        .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-20px); padding:10px 24px; border-radius:10px; font-size:14px; z-index:999; opacity:0; transition:opacity 0.3s, transform 0.3s; pointer-events:none; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast.success { background:var(--success-bg); color:var(--success); border:1px solid var(--success); }
        .toast.error { background:var(--error-bg); color:var(--error); border:1px solid var(--error); }
        .toast.info { background:#EFF6FF; color:var(--accent); border:1px solid var(--accent); }

        /* Result overlay — backdrop blur + scale in */
        .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; z-index:100; }
        .overlay.show { display:flex; }
        .overlay-card { background:var(--glass-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:var(--glass-border); border-radius:16px; padding:32px; max-width:380px; width:90%; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.2); animation:scaleIn 0.3s ease-out; }
        .overlay-icon { font-size:48px; margin-bottom:16px; }
        .overlay-title { font-size:20px; font-weight:700; margin-bottom:8px; }
        .overlay-msg { font-size:14px; color:var(--text2); margin-bottom:20px; line-height:1.6; }

        /* Register modal */
        .reg-modal .overlay-card { max-width:480px; }
        .reg-modal .camera-box { margin-bottom:12px; }
    </style>
</head>
<body>
    <!-- Nav -->
    <div class="nav">
        <div class="nav-left">
            <a href="/">← 返回</a>
            <span class="title">寝室签到</span>
        </div>
        <div class="nav-right">
            <span class="time" id="clock"></span>
            <button class="theme-toggle" id="themeToggle" data-mode="light" aria-label="切换主题" title="切换主题模式">
                <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="icon-system" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            </button>
            <button class="logout-btn" onclick="logout()">退出</button>
        </div>
    </div>

    <div class="container">
        <!-- Location Status -->
        <div class="status-card" id="locationCard">
            <div class="status-icon waiting" id="locIcon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <div class="status-title" id="locTitle">定位签到验证中.....</div>
            <div class="status-msg" id="locMsg">
                <span class="spinner"></span> 正在获取您的位置...
            </div>
            <div class="status-detail" id="locDetail"></div>
        </div>

        <!-- Face Card (hidden until location passes) -->
        <div class="face-card disabled" id="faceCard">
            <div class="face-header">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <div class="label">人脸识别验证</div>
                <span class="badge waiting" id="faceBadge">待验证</span>
            </div>
            <div class="reg-banner" id="regBanner">
                未检测到人脸数据，请先 <a onclick="openRegister()">点击注册人脸</a>
            </div>
            <div class="camera-box" id="cameraBox">
                <video id="video" autoplay playsinline style="display:none"></video>
                <img id="preview" style="display:none">
                <div class="placeholder" id="camPlaceholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:32px;height:32px;"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                    <span>点击下方按钮开启摄像头</span>
                </div>
            </div>
            <div id="faceResult" style="font-size:13px;text-align:center;margin-bottom:12px;min-height:20px"></div>
            <div class="btn-row">
                <button class="btn" id="btnCamera" onclick="startCamera()">开启摄像头</button>
                <button class="btn btn-primary" id="btnRecord" onclick="startRecording()" disabled>开始录制</button>
                <button class="btn" id="btnRetake" onclick="retake()" style="display:none">重新录制</button>
            </div>
        </div>

        <!-- Checkin Button -->
        <button class="checkin-btn" id="btnCheckin" onclick="doCheckin()" disabled>签 到</button>
    </div>

    <!-- Register Modal -->
    <div class="overlay reg-modal" id="regOverlay">
        <div class="overlay-card">
            <h3 style="margin-bottom:12px">人脸注册</h3>
            <p style="font-size:13px;color:var(--text2);margin-bottom:16px">请正对摄像头拍摄一张清晰的人脸照片</p>
            <div class="camera-box" id="regCamBox">
                <video id="regVideo" autoplay playsinline style="display:none"></video>
                <img id="regPreview" style="display:none">
                <div class="placeholder" id="regPlaceholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:32px;height:32px;"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                    <span>点击下方按钮开启摄像头</span>
                </div>
            </div>
            <div id="regResult" style="font-size:13px;text-align:center;margin-bottom:12px;min-height:20px"></div>
            <div class="btn-row" style="justify-content:center">
                <button class="btn" id="btnRegCam" onclick="startRegCamera()">开启摄像头</button>
                <button class="btn btn-primary" id="btnRegCapture" onclick="captureReg()" disabled>拍照注册</button>
            </div>
            <div style="margin-top:16px">
                <button class="btn" onclick="closeReg()" style="font-size:12px;color:var(--text3)">关闭</button>
            </div>
        </div>
    </div>

    <!-- Result Overlay -->
    <div class="overlay" id="resultOverlay">
        <div class="overlay-card">
            <div class="overlay-icon" id="resultIcon"></div>
            <div class="overlay-title" id="resultTitle"></div>
            <div class="overlay-msg" id="resultMsg"></div>
            <button class="btn btn-primary" onclick="closeResult()" style="min-width:120px">确定</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

<script>
/* ===== Theme Management ===== */
(function() {
    const MODES = ['light', 'dark', 'system'];
    const toggle = document.getElementById('themeToggle');

    function applyTheme(mode) {
        if (mode === 'system') {
            document.documentElement.removeAttribute('data-theme');
        } else {
            document.documentElement.setAttribute('data-theme', mode);
        }
        localStorage.setItem('theme', mode);
        toggle.setAttribute('data-mode', mode);
    }

    function initTheme() {
        var saved = localStorage.getItem('theme') || 'light';
        applyTheme(saved);
    }

    toggle.addEventListener('click', function() {
        var current = toggle.getAttribute('data-mode');
        var idx = MODES.indexOf(current);
        var next = MODES[(idx + 1) % MODES.length];
        applyTheme(next);
    });

    initTheme();
})();

// ========== State ==========
let faceImageData = null, faceVerified = false, locationVerified = false;
let lat = null, lng = null, accuracy = null;
let camStream = null, regStream = null, mediaRecorder = null;
let studentId = null, studentName = null;

const SCHOOL_LAT = 29.991316, SCHOOL_LNG = 122.179503, SCHOOL_RADIUS = 500;

// ========== Init ==========
document.addEventListener('DOMContentLoaded', async () => {
    updateClock(); setInterval(updateClock, 1000);
    try {
        const r = await fetch('/auth/check');
        if (!r.ok) { location.href='/login'; return; }
        const d = await r.json();
        if (!d.loggedIn) { location.href='/login'; return; }
        studentId = d.studentId; studentName = d.studentName;
    } catch(e) { location.href='/login'; return; }
    // Auto-request location
    getLocation();
});

function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN',{hour12:false});
}

// ========== Location ==========
function getLocation() {
    if (!navigator.geolocation) {
        showLocResult('error','定位功能不可用','您的浏览器不支持地理定位');
        return;
    }
    showLocResult('loading','定位签到验证中.....','<span class="spinner"></span> 正在获取您的位置...');
    navigator.geolocation.getCurrentPosition(
        pos => {
            lat = pos.coords.latitude;
            lng = pos.coords.longitude;
            accuracy = pos.coords.accuracy;
            const dist = getDistance(lat, lng, SCHOOL_LAT, SCHOOL_LNG);
            if (dist <= SCHOOL_RADIUS) {
                locationVerified = true;
                showLocResult('success',
                    '在校内！验证成功！',
                    `精度: +/-${Math.round(accuracy)}m | 距学校: ${Math.round(dist)}m - 在学校范围内`
                );
                // Enable face card
                document.getElementById('faceCard').classList.remove('disabled');
                document.getElementById('faceResult').innerHTML = '<span style="color:var(--accent)">点击上方按钮开始进行人脸识别验证！</span>';
            } else {
                locationVerified = false;
                showLocResult('error',
                    '不在校内！请立刻返校！',
                    `距学校: ${Math.round(dist)}m（需在${SCHOOL_RADIUS}m内）`
                );
            }
            updateCheckinBtn();
        },
        err => {
            showLocResult('error','定位失败', err.message === 'User denied Geolocation' ? '请允许浏览器获取位置权限' : err.message);
        },
        { enableHighAccuracy:true, timeout:15000, maximumAge:0 }
    );
}

function showLocResult(type, title, msg) {
    const card = document.getElementById('locationCard');
    const icon = document.getElementById('locIcon');
    const titleEl = document.getElementById('locTitle');
    const msgEl = document.getElementById('locMsg');
    const detail = document.getElementById('locDetail');

    icon.className = 'status-icon ' + (type === 'loading' ? 'loading' : type);
    if (type === 'success') {
        icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
    } else if (type === 'error') {
        icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px;"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
    } else {
        icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>';
    }
    titleEl.textContent = title;
    msgEl.innerHTML = msg;
    detail.textContent = '';
}

function getDistance(lat1,lon1,lat2,lon2) {
    const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ========== Face Camera ==========
function startCamera() {
    navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user', width:640, height:480 } })
        .then(s => {
            camStream = s;
            const v = document.getElementById('video');
            v.srcObject = s; v.style.display = 'block';
            document.getElementById('preview').style.display = 'none';
            document.getElementById('camPlaceholder').style.display = 'none';
            document.getElementById('btnCamera').textContent = '重新开启';
            document.getElementById('btnRecord').disabled = false;
            document.getElementById('btnRetake').style.display = 'none';
        })
        .catch(e => { toast('摄像头访问失败: ' + e.message, 'error'); });
}

function startRecording() {
    if (!camStream) return;
    const btn = document.getElementById('btnRecord');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 录制中...';
    setFaceResult('loading','录制中（5秒）...请缓慢眨眼+左右转头，然后正对镜头');

    try { mediaRecorder = new MediaRecorder(camStream, {mimeType:'video/webm'}); }
    catch(e) { mediaRecorder = new MediaRecorder(camStream); }
    const chunks = [];
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = async () => {
        try {
            const blob = new Blob(chunks, {type:'video/webm'});
            const frames = await extractFrames(blob, 5);
            const preview = document.getElementById('preview');
            preview.src = frames[0]; preview.style.display = 'block';
            document.getElementById('video').style.display = 'none';
            faceImageData = frames[0];
            if (camStream) { camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
            document.getElementById('btnCamera').textContent = '重新开启';
            document.getElementById('btnRetake').style.display = 'flex';
            await verifyFace(frames);
        } catch(err) {
            setFaceResult('error','视频处理失败: ' + err.message);
            toast('视频处理失败，请重试','error');
        }
        btn.disabled = false;
        btn.innerHTML = '重新录制';
    };
    mediaRecorder.start();
    setTimeout(() => { if(mediaRecorder.state==='recording') mediaRecorder.stop(); }, 5000);
}

async function extractFrames(blob, count) {
    return new Promise((resolve,reject) => {
        const v = document.createElement('video');
        v.src = URL.createObjectURL(blob);
        v.onloadedmetadata = async () => {
            const c = document.createElement('canvas'), ctx = c.getContext('2d');
            const frames = [];
            for (let i=0; i<count; i++) {
                v.currentTime = (v.duration/count)*i;
                await new Promise(r => v.onseeked = r);
                c.width = v.videoWidth; c.height = v.videoHeight;
                ctx.drawImage(v,0,0);
                frames.push(c.toDataURL('image/png'));
            }
            URL.revokeObjectURL(v.src);
            resolve(frames);
        };
        v.onerror = reject;
    });
}

async function verifyFace(frames) {
    setFaceResult('loading','正在匹对人脸中...');
    updateBadge('loading','验证中...');
    try {
        const resp = await fetch('/face/detect', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({frames:frames})
        });
        const data = await resp.json();
        if (data.success) {
            faceVerified = true;
            setFaceResult('success','验证成功！点击签到即可！');
            updateBadge('success','已通过');
            toast('人脸识别通过！','success');
        } else {
            faceVerified = false;
            updateBadge('error','验证失败');
            if (data.message && (data.message.includes('not found') || data.message.includes('match user') || data.message.includes('未注册'))) {
                document.getElementById('regBanner').style.display = 'block';
                setFaceResult('error','未注册人脸数据，请先注册');
            } else {
                setFaceResult('error','验证失败，请重新验证人脸！');
            }
            toast(data.message || '验证失败','error');
        }
    } catch(err) {
        faceVerified = false;
        updateBadge('error','网络异常');
        setFaceResult('error','网络异常，请重试');
        toast('网络异常','error');
    }
    updateCheckinBtn();
}

function retake() {
    faceImageData = null; faceVerified = false;
    document.getElementById('preview').style.display = 'none';
    document.getElementById('video').style.display = 'none';
    document.getElementById('camPlaceholder').style.display = 'flex';
    document.getElementById('btnRecord').disabled = true;
    document.getElementById('btnRecord').innerHTML = '开始录制';
    document.getElementById('btnRetake').style.display = 'none';
    document.getElementById('btnCamera').textContent = '开启摄像头';
    setFaceResult('','');
    updateBadge('waiting','待验证');
    updateCheckinBtn();
}

function setFaceResult(type, text) {
    const el = document.getElementById('faceResult');
    el.innerHTML = text;
    el.style.color = type==='success' ? 'var(--success)' : type==='error' ? 'var(--error)' : type==='loading' ? 'var(--accent)' : '';
}

function updateBadge(type, text) {
    const b = document.getElementById('faceBadge');
    b.className = 'badge ' + type;
    b.textContent = text;
}

// ========== Checkin ==========
function updateCheckinBtn() {
    const btn = document.getElementById('btnCheckin');
    btn.disabled = !(locationVerified && faceVerified);
}

async function doCheckin() {
    const btn = document.getElementById('btnCheckin');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 提交中...';
    try {
        const resp = await fetch('/checkin/verify', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                faceImageData: faceImageData,
                latitude: lat, longitude: lng
            })
        });
        const data = await resp.json();
        if (data.success) {
            showResult('success','签到成功！', data.message || '签到记录已保存');
            btn.innerHTML = '已签到';
            btn.classList.add('success');
        } else {
            showResult('error','签到失败', data.message || '请重试');
            btn.disabled = false;
            btn.innerHTML = '签 到';
        }
    } catch(err) {
        showResult('error','网络错误', err.message);
        btn.disabled = false;
        btn.innerHTML = '签 到';
    }
}

// ========== Register ==========
function openRegister() { document.getElementById('regOverlay').classList.add('show'); }
function closeReg() {
    document.getElementById('regOverlay').classList.remove('show');
    if (regStream) { regStream.getTracks().forEach(t=>t.stop()); regStream=null; }
    document.getElementById('regVideo').style.display='none';
    document.getElementById('regPreview').style.display='none';
    document.getElementById('regPlaceholder').style.display='flex';
    document.getElementById('btnRegCapture').disabled = true;
    document.getElementById('regResult').innerHTML = '';
}

function startRegCamera() {
    navigator.mediaDevices.getUserMedia({ video:{facingMode:'user',width:640,height:480} })
        .then(s => {
            regStream = s;
            const v = document.getElementById('regVideo');
            v.srcObject = s; v.style.display = 'block';
            document.getElementById('regPreview').style.display = 'none';
            document.getElementById('regPlaceholder').style.display = 'none';
            document.getElementById('btnRegCapture').disabled = false;
        })
        .catch(e => { toast('摄像头访问失败','error'); });
}

async function captureReg() {
    const v = document.getElementById('regVideo');
    const c = document.createElement('canvas');
    c.width = v.videoWidth; c.height = v.videoHeight;
    c.getContext('2d').drawImage(v,0,0);
    const imgData = c.toDataURL('image/png');

    document.getElementById('regPreview').src = imgData;
    document.getElementById('regPreview').style.display = 'block';
    v.style.display = 'none';
    if (regStream) { regStream.getTracks().forEach(t=>t.stop()); regStream=null; }

    document.getElementById('regResult').innerHTML = '<span class="spinner"></span> 正在注册...';
    try {
        const resp = await fetch('/face/register', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({imageData: imgData, studentId: studentId})
        });
        const data = await resp.json();
        if (data.success) {
            document.getElementById('regResult').innerHTML = '<span style="color:var(--success)">注册成功！</span>';
            document.getElementById('regBanner').style.display = 'none';
            toast('人脸注册成功！','success');
            setTimeout(closeReg, 1500);
        } else {
            document.getElementById('regResult').innerHTML = '<span style="color:var(--error)">' + (data.message||'注册失败') + '</span>';
        }
    } catch(err) {
        document.getElementById('regResult').innerHTML = '<span style="color:var(--error)">网络错误</span>';
    }
}

// ========== Utils ==========
function toast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast ' + (type||'info') + ' show';
    setTimeout(() => t.classList.remove('show'), 3000);
}

function showResult(icon, title, msg) {
    const iconEl = document.getElementById('resultIcon');
    if (icon === 'success') {
        iconEl.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:48px;height:48px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
    } else {
        iconEl.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:48px;height:48px;"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
    }
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultMsg').textContent = msg;
    document.getElementById('resultOverlay').classList.add('show');
}
function closeResult() { document.getElementById('resultOverlay').classList.remove('show'); }

async function logout() {
    await fetch('/auth/logout', {method:'POST'});
    location.href = '/login';
}
